---
# ─────────────────────────────────────────────────────────────────────────────
# Variables communes — Production Matrix Stack
# Les secrets sont dans vault.yml (chiffré Ansible Vault).
# ─────────────────────────────────────────────────────────────────────────────

environment_name: production
deploy_user: deploy

matrix_postgres_host: "10.0.1.10"  # À remplacer par l'IP réelle
matrix_postgres_port: 5432

matrix_users_server_name: "matrix.example.com"
matrix_users_public_baseurl: "https://matrix.example.com/"
matrix_users_container_name: synapse-users
matrix_users_http_port: 8008

matrix_bridges_server_name: "matrix-bridges.example.com"
matrix_bridges_public_baseurl: "https://matrix-bridges.example.com/"
matrix_bridges_container_name: synapse-bridges
matrix_bridges_http_port: 8009

matrix_federation_enabled: true

matrix_oidc_enabled: false
matrix_oidc_issuer: ""
matrix_oidc_client_id: ""
matrix_oidc_client_secret: ""

# Références vault
matrix_postgres_superuser_password: "{{ vault_matrix_postgres_superuser_password }}"
matrix_postgres_password_users: "{{ vault_matrix_postgres_password_users }}"
matrix_postgres_password_bridges: "{{ vault_matrix_postgres_password_bridges }}"
matrix_users_registration_shared_secret: "{{ vault_matrix_users_registration_shared_secret }}"
matrix_users_macaroon_secret_key: "{{ vault_matrix_users_macaroon_secret_key }}"
matrix_users_form_secret: "{{ vault_matrix_users_form_secret }}"
matrix_bridges_registration_shared_secret: "{{ vault_matrix_bridges_registration_shared_secret }}"
matrix_bridges_macaroon_secret_key: "{{ vault_matrix_bridges_macaroon_secret_key }}"
matrix_bridges_form_secret: "{{ vault_matrix_bridges_form_secret }}"

# ── PostgreSQL — bases génériques ────────────────────────────────────────────
matrix_postgresql_databases:
  - name: synapse_users
    user: synapse_users
    password: "{{ matrix_postgres_password_users }}"

  - name: synapse_bridges
    user: synapse_bridges
    password: "{{ matrix_postgres_password_bridges }}"

  - name: mautrix_whatsapp
    user: mautrix_whatsapp
    password: "{{ vault_matrix_bridge_whatsapp_db_password }}"

  - name: mautrix_telegram
    user: mautrix_telegram
    password: "{{ vault_matrix_bridge_telegram_db_password }}"

  - name: mautrix_signal
    user: mautrix_signal
    password: "{{ vault_matrix_bridge_signal_db_password }}"

# ── Bridges Matrix ────────────────────────────────────────────────────────────
# Désactivé par défaut : activer une fois validé en staging.
matrix_bridges_enabled: false

matrix_bridges_default_permissions:
  "*": ""
  "matrix-users.example.com": "user"
  "@bridge-master:matrix-bridges.example.com": "admin"

matrix_bridges:
  - name: whatsapp
    image: dock.mau.dev/mautrix/whatsapp
    tag: latest
    container_name: mautrix-whatsapp
    appservice_id: whatsapp
    appservice_port: 29317
    bot_username: whatsappbot
    database_name: mautrix_whatsapp
    database_user: mautrix_whatsapp
    database_password: "{{ vault_matrix_bridge_whatsapp_db_password }}"

  - name: telegram
    image: dock.mau.dev/mautrix/telegram
    tag: latest
    container_name: mautrix-telegram
    appservice_id: telegram
    appservice_port: 29318
    bot_username: telegrambot
    database_name: mautrix_telegram
    database_user: mautrix_telegram
    database_password: "{{ vault_matrix_bridge_telegram_db_password }}"

  - name: signal
    image: dock.mau.dev/mautrix/signal
    tag: latest
    container_name: mautrix-signal
    appservice_id: signal
    appservice_port: 29319
    bot_username: signalbot
    database_name: mautrix_signal
    database_user: mautrix_signal
    database_password: "{{ vault_matrix_bridge_signal_db_password }}"
